<table width="100%" cellpadding="0" cellspacing="0" border="0"
       style="background-color:#f9f9f7;font-family:Arial,Helvetica,sans-serif;">
  <tr>
    <td align="center" style="padding:32px 16px 48px;">

      <table width="600" cellpadding="0" cellspacing="0" border="0"
             style="max-width:600px;width:100%;background-color:#ffffff;
                    border:1px solid #e5e7eb;border-radius:4px;overflow:hidden;">

        <!-- HEADER -->
        <tr>
          <td style="background-color:#111827;padding:20px 32px;">
            <span style="font-family:Georgia,'Times New Roman',serif;
                         font-size:20px;font-weight:bold;color:#ffffff;
                         letter-spacing:-0.3px;">
              Northwest Newswire
            </span>
          </td>
        </tr>

        <!-- CONTENT -->
        <tr>
          <td style="padding:36px 32px 28px;">
            <h2 style="margin:0 0 8px;font-family:Georgia,'Times New Roman',serif;
                       font-size:22px;font-weight:bold;color:#111827;line-height:1.3;
                       letter-spacing:-0.3px;">
              Your sign-in code
            </h2>
            <p style="margin:0 0 32px;font-size:15px;color:#6b7280;line-height:1.6;">
              Use the code below to sign in to Northwest Newswire. It expires in 10 minutes.
            </p>

            <!-- CODE BLOCK -->
            <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:32px;">
              <tr>
                <td style="background-color:#f9f9f7;border:1px solid #e5e7eb;
                           border-radius:4px;padding:20px 36px;">
                  <span style="font-family:'Courier New',Courier,monospace;
                               font-size:36px;font-weight:700;color:#111827;
                               letter-spacing:0.25em;">
                    {{ .Token }}
                  </span>
                </td>
              </tr>
            </table>

            <p style="margin:0;font-size:13px;color:#6b7280;line-height:1.6;">
              If you didn't request this code, you can safely ignore this email.
              Someone may have entered your address by mistake.
            </p>
          </td>
        </tr>

        <!-- FOOTER DIVIDER -->
        <tr>
          <td style="padding:0 32px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="border-top:1px solid #e5e7eb;font-size:0;line-height:0;">&nbsp;</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td style="background-color:#f9f9f7;padding:18px 32px 22px;">
            <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:12px;
                      color:#6b7280;line-height:1.6;">
              This email was sent by Northwest Newswire.
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
